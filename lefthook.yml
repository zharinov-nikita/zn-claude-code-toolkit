pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{json,ts,js,jsx,tsx}"
      run: bunx biome check --no-errors-on-unmatched "{staged_files}"
    - name: typescript
      glob: "*.ts"
      run: bun run check:ts
    - name: markdown
      glob: "*.md"
      run: bunx markdownlint-cli2 "{staged_files}"
